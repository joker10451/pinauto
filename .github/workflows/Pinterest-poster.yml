name: Pinterest Automatic Poster

on:
  schedule:
    # Запуск каждые 2 часа. Минуты ставим случайные (27),
    # чтобы не запускаться ровно в 00 минут как все остальные боты.
    - cron: '27 */2 * * *'
  # Позволяет запускать скрипт вручную кнопкой в панели GitHub
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем код из репозитория
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Поднимаем Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Восстанавливаем куки Pinterest из кэша
      - name: Restore Pinterest Cookies
        uses: actions/cache@v4
        with:
          path: cookies.json
          key: ${{ runner.os }}-pinterest-cookies-v1
          restore-keys: |
            ${{ runner.os }}-pinterest-cookies-

      # 4. Устанавливаем зависимости
      - name: Install dependencies
        run: npm ci

      # 5. Устанавливаем только Chromium для Playwright
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      # 6. Забираем новые офферы из Perfluence
      - name: Scrape Perfluence Offers
        env:
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
          CONTENT_PLAN_COLLECTION: ${{ secrets.CONTENT_PLAN_COLLECTION }}
        run: npm run perfluence:scrape

      # 7. Запуск постинга с прокидыванием переменных окружения
      - name: Run Pinterest Poster
        env:
          HEADLESS: "true"
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
          CONTENT_PLAN_COLLECTION: ${{ secrets.CONTENT_PLAN_COLLECTION }}
          POST_INTERVAL_SEC: ${{ secrets.POST_INTERVAL_SEC }}
        run: npm run github:post

      # 8. Сохраняем обновлённые куки обратно в кэш
      - name: Save Pinterest Cookies
        if: always()
        uses: actions/cache/save@v4
        with:
          path: cookies.json
          key: ${{ runner.os }}-pinterest-cookies-v1-${{ github.run_id }}
